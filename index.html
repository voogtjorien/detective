
<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>De Sekte — Notities</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;700&family=Caveat:wght@600;700&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --ink: #2a1f0e;
  --ink-faded: #5a4530;
  --stamp-red: #8b2020;
  --paper: #d4b878;
  --paper-dark: #c4a860;
  --kraft-light: #e8d4a8;
}
body { background: #0e0a04; font-family: 'Inter', sans-serif; color: var(--ink); min-height: 100vh; }

/* ══ TV VIEW ══ */
#tv-view {
  width: 100vw; height: 100vh;
  display: flex; flex-direction: column;
  padding: 16px 20px 14px;
  background: radial-gradient(ellipse at center, #2a1e0a 0%, #0e0a04 100%);
  overflow: hidden;
}
.tv-header {
  display: flex; align-items: baseline; justify-content: space-between;
  margin-bottom: 12px; flex-shrink: 0;
}
.tv-title { font-size: 20px; color: var(--kraft-light); letter-spacing: 0.12em; text-transform: uppercase; }
.tv-title span { color: var(--stamp-red); font-size: 11px; display: block; letter-spacing: 0.25em; margin-top: 1px; }
.clock { font-size: 12px; color: #4a3a28; letter-spacing: 0.1em; }

.grid {
  flex: 1; display: grid;
  grid-template-columns: repeat(3, 1fr);
  grid-template-rows: repeat(2, 1fr);
  gap: 10px; overflow: hidden;
}

.card {
  background: var(--paper);
  border-radius: 2px;
  padding: 10px 12px 8px;
  display: flex; flex-direction: column;
  position: relative; overflow: hidden;
  box-shadow: 2px 3px 12px rgba(0,0,0,0.6), inset 0 0 40px rgba(0,0,0,0.06);
}
.card::before {
  content: '';
  position: absolute; inset: 0;
  background-image: repeating-linear-gradient(transparent, transparent 20px, rgba(160,120,60,0.22) 20px, rgba(160,120,60,0.22) 21px);
  pointer-events: none;
}


.card-top {
  display: flex; align-items: center; justify-content: space-between;
  border-bottom: 1px solid rgba(100,70,30,0.35);
  padding-bottom: 5px; margin-bottom: 6px;
  flex-shrink: 0; position: relative; z-index: 1;
}
.card-name { font-size: 13px; color: var(--ink); letter-spacing: 0.08em; text-transform: uppercase; }
.card-stamp {
  font-size: 8px; color: var(--stamp-red); letter-spacing: 0.12em;
  border: 1px solid var(--stamp-red); padding: 1px 4px; border-radius: 1px;
  opacity: 0.55; transform: rotate(2deg);
}

/* categories inside card */
.card-body { flex: 1; overflow: hidden; display: flex; flex-direction: column; gap: 5px; position: relative; z-index: 1; }

.tv-category { display: flex; flex-direction: column; gap: 1px; }
.tv-cat-label {
  font-size: 9px; letter-spacing: 0.14em; text-transform: uppercase;
  color: var(--stamp-red); opacity: 0.75; margin-bottom: 1px;
  font-family: 'Inter', sans-serif;
}
.tv-note {
  font-family: 'Inter', sans-serif; font-weight: 700;
  font-size: 12px; color: var(--ink); line-height: 1.3;
  padding-left: 8px;
}
.tv-note::before { content: '— '; color: var(--ink-faded); font-size: 10px; }
.tv-empty { font-family: 'Inter', sans-serif; font-weight: 700; font-size: 11px; color: rgba(90,69,48,0.35); ; }

/* ══ MOBILE VIEW ══ */
#mobile-view { display: none; min-height: 100vh; background: #0e0a04; padding: 28px 16px 50px; }

.mobile-header { text-align: center; margin-bottom: 26px; }
.mobile-title { font-size: 20px; color: var(--kraft-light); letter-spacing: 0.12em; text-transform: uppercase; }
.mobile-sub { font-size: 10px; color: #4a3a28; letter-spacing: 0.2em; text-transform: uppercase; margin-top: 4px; }

.player-select-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.player-btn {
  background: var(--paper); border: none; border-radius: 2px;
  padding: 16px 10px; cursor: pointer; text-align: center;
  box-shadow: 2px 3px 10px rgba(0,0,0,0.5); position: relative; overflow: hidden;
}
.player-btn::before {
  content: ''; position: absolute; inset: 0;
  background-image: repeating-linear-gradient(transparent, transparent 20px, rgba(160,120,60,0.2) 20px, rgba(160,120,60,0.2) 21px);
  pointer-events: none;
}
.player-btn:active { opacity: 0.8; }
.btn-name { font-size: 15px; color: var(--ink); letter-spacing: 0.06em; text-transform: uppercase; position: relative; }

/* ── player sheet ── */
#player-sheet { display: none; }
.back-btn {
  background: none; border: none;
  font-family: 'Inter', sans-serif; font-size: 11px;
  color: #4a3a28; letter-spacing: 0.15em; text-transform: uppercase;
  cursor: pointer; margin-bottom: 16px; display: block;
}

.sheet-paper {
  background: var(--paper); border-radius: 2px;
  box-shadow: 2px 3px 14px rgba(0,0,0,0.55);
  position: relative; overflow: hidden;
}
.sheet-paper::before {
  content: ''; position: absolute; inset: 0;
  background-image: repeating-linear-gradient(transparent, transparent 26px, rgba(160,120,60,0.22) 26px, rgba(160,120,60,0.22) 27px);
  pointer-events: none;
}


.sheet-header {
  padding: 14px 14px 10px;
  border-bottom: 1px solid rgba(100,70,30,0.3);
  position: relative; z-index: 1;
}
.sheet-name { font-size: 17px; color: var(--ink); letter-spacing: 0.08em; text-transform: uppercase; }

/* tabs */
.tabs-row {
  display: flex; gap: 0; overflow-x: auto;
  padding: 0 14px; border-bottom: 1px solid rgba(100,70,30,0.3);
  position: relative; z-index: 1;
  scrollbar-width: none;
}
.tabs-row::-webkit-scrollbar { display: none; }

.tab-btn {
  background: none; border: none; border-bottom: 2px solid transparent;
  font-family: 'Inter', sans-serif; font-size: 11px;
  color: var(--ink-faded); letter-spacing: 0.1em; text-transform: uppercase;
  padding: 8px 10px; cursor: pointer; white-space: nowrap; flex-shrink: 0;
}
.tab-btn.active { color: var(--stamp-red); border-bottom-color: var(--stamp-red); }
.tab-btn.add-tab { color: rgba(90,69,48,0.5); font-size: 16px; padding: 6px 10px; letter-spacing: 0; }
.tab-btn.add-tab:hover { color: var(--ink); }

/* new category input */
#new-cat-row {
  display: none; padding: 8px 14px;
  border-bottom: 1px solid rgba(100,70,30,0.2);
  position: relative; z-index: 1; gap: 8px; align-items: center;
}
.cat-input {
  flex: 1; background: transparent; border: none;
  border-bottom: 1px solid rgba(100,70,30,0.4);
  font-family: 'Inter', sans-serif; font-size: 13px;
  color: var(--ink); padding: 3px 0; outline: none;
  letter-spacing: 0.06em;
}
.cat-input::placeholder { color: rgba(90,69,48,0.4); ; }
.cat-ok-btn {
  background: var(--ink); border: none; color: var(--kraft-light);
  font-family: 'Inter', sans-serif; font-size: 11px;
  letter-spacing: 0.1em; padding: 4px 10px; border-radius: 1px; cursor: pointer;
}

/* notes in active tab */
.tab-content { padding: 10px 14px 14px; position: relative; z-index: 1; }

.note-list { display: flex; flex-direction: column; gap: 5px; margin-bottom: 10px; }
.m-note-item {
  font-family: 'Inter', sans-serif; font-weight: 700; font-size: 16px;
  color: var(--ink); line-height: 1.4;
  display: flex; align-items: flex-start; gap: 4px;
}
.m-note-item::before { content: '— '; color: var(--ink-faded); font-size: 13px; flex-shrink: 0; margin-top: 2px; }
.m-note-text { flex: 1; }
.del-btn {
  background: none; border: none; color: rgba(100,60,30,0.3);
  cursor: pointer; font-size: 18px; padding: 0; line-height: 1; flex-shrink: 0;
}
.del-btn:hover { color: var(--stamp-red); }

.note-input-area {
  display: flex; gap: 8px; align-items: flex-end;
  border-top: 1px solid rgba(100,70,30,0.25); padding-top: 10px; margin-top: 6px;
}
.note-textarea {
  flex: 1; background: transparent; border: none;
  border-bottom: 1px solid rgba(100,70,30,0.35);
  font-family: 'Inter', sans-serif; font-weight: 700; font-size: 17px;
  color: var(--ink); padding: 4px 0; resize: none; height: 60px; outline: none;
}
.note-textarea::placeholder { color: rgba(90,69,48,0.35); ; }
.add-note-btn {
  background: var(--ink); border: none; color: var(--kraft-light);
  font-family: 'Inter', sans-serif; font-size: 11px;
  letter-spacing: 0.1em; text-transform: uppercase;
  padding: 7px 12px; border-radius: 1px; cursor: pointer; flex-shrink: 0;
}
.add-note-btn:active { opacity: 0.8; }

.no-cat-hint {
  font-family: 'Inter', sans-serif; font-weight: 700; font-size: 15px;
  color: rgba(90,69,48,0.4); ; padding: 16px 0; text-align: center;
}
</style>
</head>
<body>

<!-- ══ TV VIEW ══ -->
<div id="tv-view">
  <div class="tv-header">
    <div class="tv-title">De Sekte <span>— onopgeloste mysteries —</span></div>
    <span class="clock" id="clock"></span>
  </div>
  <div class="grid" id="tv-grid"></div>
</div>

<!-- ══ MOBILE VIEW ══ -->
<div id="mobile-view">
  <div class="mobile-header">
    <div class="mobile-title">De Sekte</div>
    <div class="mobile-sub" id="mobile-sub">kies jouw naam</div>
  </div>

  <div class="player-select-grid" id="player-select-grid"></div>

  <div id="player-sheet">
    <button class="back-btn" onclick="showPlayerSelect()">← terug</button>
    <div class="sheet-paper">
      <div class="sheet-header">
        <div class="sheet-name" id="sheet-name"></div>
      </div>
      <div class="tabs-row" id="tabs-row">
        <button class="tab-btn add-tab" onclick="showNewCatRow()" title="Nieuwe categorie">+</button>
      </div>
      <div id="new-cat-row" style="display:none;flex-direction:row;">
        <input class="cat-input" id="cat-input" placeholder="naam van categorie..." maxlength="30"
          onkeydown="if(event.key==='Enter') addCategory()">
        <button class="cat-ok-btn" onclick="addCategory()">ok</button>
      </div>
      <div class="tab-content" id="tab-content"></div>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
import { getDatabase, ref, onValue, push, remove, set } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyDTDmAQ28KFkxgP5Sbyf31Et0Z3VU0Ecxk",
  authDomain: "murder-mystery-980c1.firebaseapp.com",
  databaseURL: "https://murder-mystery-980c1-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "murder-mystery-980c1",
  storageBucket: "murder-mystery-980c1.firebasestorage.app",
  messagingSenderId: "1000610087640",
  appId: "1:1000610087640:web:8264d2ca52c5571b1b4dad"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const PLAYERS = [
  { id: 0, name: "Jorien",  stamp: "J.V." },
  { id: 1, name: "Leen",    stamp: "L." },
  { id: 2, name: "Zindzi",  stamp: "Z." },
  { id: 3, name: "Sterre",  stamp: "S." },
  { id: 4, name: "Paula",   stamp: "P." },
  { id: 5, name: "Ros",     stamp: "R." },
];

// data shape: { playerId: { cats: { catKey: { name, order } }, notes: { catKey: { noteKey: text } } } }
let data = {};
let activePlayer = null;
let activeTab = null; // catKey

const isMobile = window.innerWidth < 700;
if (isMobile) {
  document.getElementById('tv-view').style.display = 'none';
  document.getElementById('mobile-view').style.display = 'block';
}

onValue(ref(db, 'data'), snap => {
  data = snap.val() || {};
  if (!isMobile) renderTV();
  if (isMobile && activePlayer !== null) {
    renderTabs();
    renderTabContent();
  }
});

function updateClock() {
  const el = document.getElementById('clock');
  if (el) el.textContent = new Date().toLocaleTimeString('nl-NL', { hour: '2-digit', minute: '2-digit' });
}
updateClock(); setInterval(updateClock, 15000);

// ══ TV ══
function renderTV() {
  const grid = document.getElementById('tv-grid');
  grid.innerHTML = '';
  PLAYERS.forEach(p => {
    const pData = data[p.id] || {};
    const cats = pData.cats ? Object.entries(pData.cats).sort((a,b) => (a[1].order||0)-(b[1].order||0)) : [];
    const notes = pData.notes || {};

    const card = document.createElement('div');
    card.className = 'card';

    let bodyHtml = '';
    if (cats.length === 0) {
      bodyHtml = `<div class="tv-empty">nog geen notities...</div>`;
    } else {
      cats.forEach(([catKey, cat]) => {
        const catNotes = notes[catKey] ? Object.values(notes[catKey]) : [];
        bodyHtml += `<div class="tv-category">
          <div class="tv-cat-label">${esc(cat.name)}</div>
          ${catNotes.length ? catNotes.map(n => `<div class="tv-note">${esc(n)}</div>`).join('') : `<div class="tv-note" style="opacity:0.35;font-style:italic">—</div>`}
        </div>`;
      });
    }

    card.innerHTML = `
      <div class="card-top">
        <div class="card-name">${esc(p.name)}</div>
        <div class="card-stamp">${p.stamp}</div>
      </div>
      <div class="card-body">${bodyHtml}</div>
    `;
    grid.appendChild(card);
  });
}

// ══ MOBILE ══
function renderPlayerSelect() {
  const grid = document.getElementById('player-select-grid');
  grid.innerHTML = '';
  PLAYERS.forEach(p => {
    const btn = document.createElement('div');
    btn.className = 'player-btn';
    btn.innerHTML = `<div class="btn-name">${esc(p.name)}</div>`;
    btn.onclick = () => openPlayer(p.id);
    grid.appendChild(btn);
  });
}

function openPlayer(id) {
  activePlayer = id;
  activeTab = null;
  const p = PLAYERS[id];
  document.getElementById('player-select-grid').style.display = 'none';
  document.getElementById('mobile-sub').textContent = '';
  document.getElementById('player-sheet').style.display = 'block';
  document.getElementById('sheet-name').textContent = p.name;

  // pick first tab if exists
  const cats = getCats();
  if (cats.length > 0) activeTab = cats[0][0];

  renderTabs();
  renderTabContent();
}

function getCats() {
  const pData = data[activePlayer] || {};
  return pData.cats ? Object.entries(pData.cats).sort((a,b) => (a[1].order||0)-(b[1].order||0)) : [];
}

function renderTabs() {
  const row = document.getElementById('tabs-row');
  const cats = getCats();
  row.innerHTML = '';
  cats.forEach(([key, cat]) => {
    const btn = document.createElement('button');
    btn.className = 'tab-btn' + (key === activeTab ? ' active' : '');
    btn.textContent = cat.name;
    btn.onclick = () => { activeTab = key; renderTabs(); renderTabContent(); };
    row.appendChild(btn);
  });
  const addBtn = document.createElement('button');
  addBtn.className = 'tab-btn add-tab';
  addBtn.textContent = '+';
  addBtn.title = 'Nieuwe categorie';
  addBtn.onclick = showNewCatRow;
  row.appendChild(addBtn);
}

function renderTabContent() {
  const content = document.getElementById('tab-content');
  if (!activeTab) {
    content.innerHTML = `<div class="no-cat-hint">maak een categorie aan via +</div>`;
    return;
  }
  const pData = data[activePlayer] || {};
  const catNotes = pData.notes && pData.notes[activeTab] ? Object.entries(pData.notes[activeTab]) : [];

  const noteListHtml = catNotes.length
    ? catNotes.map(([key, text]) => `
        <div class="m-note-item">
          <span class="m-note-text">${esc(text)}</span>
          <button class="del-btn" data-key="${key}">×</button>
        </div>`).join('')
    : `<div style="font-family:'Inter',sans-serif;font-size:14px;color:rgba(90,69,48,0.35);font-style:italic;padding:4px 0">nog leeg...</div>`;

  content.innerHTML = `
    <div class="note-list" id="note-list">${noteListHtml}</div>
    <div class="note-input-area">
      <textarea class="note-textarea" id="note-input" placeholder="schrijf hier..."></textarea>
      <button class="add-note-btn" onclick="submitNote()">toevoegen</button>
    </div>
  `;

  content.querySelectorAll('.del-btn').forEach(btn => {
    btn.onclick = () => remove(ref(db, `data/${activePlayer}/notes/${activeTab}/${btn.dataset.key}`));
  });

  const ta = document.getElementById('note-input');
  if (ta) ta.focus();
}

window.showNewCatRow = function() {
  const row = document.getElementById('new-cat-row');
  row.style.display = 'flex';
  document.getElementById('cat-input').focus();
};

window.addCategory = function() {
  const input = document.getElementById('cat-input');
  const name = input.value.trim();
  if (!name || activePlayer === null) return;
  const cats = getCats();
  push(ref(db, `data/${activePlayer}/cats`), { name, order: cats.length });
  input.value = '';
  document.getElementById('new-cat-row').style.display = 'none';
};

window.submitNote = function() {
  const input = document.getElementById('note-input');
  if (!input) return;
  const text = input.value.trim();
  if (!text || activePlayer === null || !activeTab) return;
  push(ref(db, `data/${activePlayer}/notes/${activeTab}`), text);
  input.value = '';
  input.focus();
};

window.showPlayerSelect = function() {
  activePlayer = null; activeTab = null;
  document.getElementById('player-sheet').style.display = 'none';
  document.getElementById('player-select-grid').style.display = 'grid';
  document.getElementById('mobile-sub').textContent = 'kies jouw naam';
  document.getElementById('new-cat-row').style.display = 'none';
};

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

if (isMobile) renderPlayerSelect();
</script>
</body>
</html>
