
<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>De Sekte — Notities</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --ink: #2a1f0e;
  --ink-faded: #6a5540;
  --stamp-red: #8b2020;
  --paper: #d4b878;
  --paper-dark: #c0a060;
  --kraft-light: #e8d4a8;
  --bg: #0e0a04;
}
body { background: var(--bg); font-family: 'Inter', sans-serif; color: var(--ink); min-height: 100vh; user-select: none; }

/* ══ TV VIEW ══ */
#tv-view {
  width: 100vw; height: 100vh;
  display: flex; flex-direction: column;
  padding: 14px 18px 12px;
  background: radial-gradient(ellipse at center, #2a1e0a 0%, #0e0a04 100%);
  overflow: hidden;
}
.tv-header {
  display: flex; align-items: baseline; justify-content: space-between;
  margin-bottom: 10px; flex-shrink: 0;
}
.tv-title { font-size: 18px; font-weight: 700; color: var(--kraft-light); letter-spacing: 0.1em; text-transform: uppercase; }
.tv-title span { color: var(--stamp-red); font-size: 10px; font-weight: 500; display: block; letter-spacing: 0.2em; margin-top: 1px; }
.clock { font-size: 12px; font-weight: 500; color: #4a3a28; letter-spacing: 0.1em; }

.grid {
  flex: 1; display: grid;
  grid-template-columns: repeat(2, 1fr);
  grid-template-rows: repeat(2, 1fr);
  gap: 10px; overflow: hidden;
}

.card {
  background: var(--paper); border-radius: 2px;
  display: flex; flex-direction: column;
  position: relative; overflow: hidden;
  box-shadow: 2px 3px 14px rgba(0,0,0,0.65), inset 0 0 50px rgba(0,0,0,0.06);
}
.card::before {
  content: ''; position: absolute; inset: 0;
  background-image: repeating-linear-gradient(transparent, transparent 22px, rgba(160,120,60,0.2) 22px, rgba(160,120,60,0.2) 23px);
  pointer-events: none; z-index: 0;
}

.card-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 8px 12px 0; flex-shrink: 0; position: relative; z-index: 2;
}
.card-title { font-size: 13px; font-weight: 700; color: var(--ink); letter-spacing: 0.1em; text-transform: uppercase; }
.card-stamp { font-size: 8px; font-weight: 700; color: var(--stamp-red); letter-spacing: 0.12em; border: 1px solid var(--stamp-red); padding: 1px 4px; border-radius: 1px; opacity: 0.6; transform: rotate(2deg); }

.tab-row {
  display: flex; gap: 2px; padding: 6px 10px 0;
  flex-shrink: 0; position: relative; z-index: 2;
  border-bottom: 1px solid rgba(100,70,30,0.3);
}
.tv-tab {
  font-size: 9px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase;
  color: var(--ink-faded); padding: 4px 8px;
  border-radius: 2px 2px 0 0; cursor: pointer;
  border: 1px solid transparent; border-bottom: none; background: transparent;
}
.tv-tab:hover { background: rgba(0,0,0,0.06); }
.tv-tab.active {
  background: var(--paper-dark); color: var(--ink);
  border-color: rgba(100,70,30,0.3);
  border-bottom: 1px solid var(--paper-dark); margin-bottom: -1px;
}

.card-body {
  flex: 1; overflow-y: auto; padding: 6px 10px 8px;
  position: relative; z-index: 1;
  scrollbar-width: thin; scrollbar-color: rgba(100,70,30,0.3) transparent;
}

/* ── note rows ── */
.note-row {
  display: flex; align-items: flex-start; gap: 6px;
  padding: 3px 2px; border-radius: 3px;
  cursor: grab; transition: background 0.1s;
  position: relative;
}
.note-row:hover { background: rgba(0,0,0,0.05); }
.note-row:hover .note-del { opacity: 1; }
.note-row.dragging { opacity: 0.4; cursor: grabbing; }
.note-row.drag-over { background: rgba(100,70,30,0.15); border-radius: 3px; }

.drag-handle {
  font-size: 10px; color: rgba(100,70,30,0.25); flex-shrink: 0;
  margin-top: 2px; cursor: grab; line-height: 1;
  transition: color 0.1s;
}
.note-row:hover .drag-handle { color: rgba(100,70,30,0.5); }

.note-text-tv {
  font-size: 11px; font-weight: 500; color: var(--ink); line-height: 1.4; flex: 1;
  outline: none; cursor: text;
  border-radius: 2px;
  padding: 1px 3px; margin: -1px -3px;
}
.note-text-tv:focus { background: rgba(255,255,255,0.35); cursor: text; }
.note-text-tv::before { content: '— '; color: var(--ink-faded); font-size: 10px; }

.note-del {
  opacity: 0; background: none; border: none;
  color: var(--stamp-red); cursor: pointer; font-size: 13px;
  padding: 0; line-height: 1; flex-shrink: 0; margin-top: 1px;
  transition: opacity 0.15s;
}

/* inline add on TV */
.tv-add-row {
  display: flex; align-items: center; gap: 4px;
  padding: 4px 2px; border-top: 1px solid rgba(100,70,30,0.15); margin-top: 4px;
}
.tv-add-input {
  flex: 1; background: transparent; border: none;
  border-bottom: 1px solid rgba(100,70,30,0.3);
  font-family: 'Inter', sans-serif; font-size: 11px; font-weight: 500;
  color: var(--ink); padding: 2px 0; outline: none;
}
.tv-add-input::placeholder { color: rgba(90,69,48,0.35); font-style: italic; }
.tv-add-btn {
  background: var(--ink); border: none; color: var(--kraft-light);
  font-family: 'Inter', sans-serif; font-size: 9px; font-weight: 700;
  letter-spacing: 0.08em; text-transform: uppercase;
  padding: 3px 8px; border-radius: 1px; cursor: pointer; flex-shrink: 0;
}

.tv-empty { font-size: 11px; color: rgba(90,69,48,0.35); padding: 4px 0; font-style: italic; }

/* ══ MOBILE VIEW ══ */
#mobile-view { display: none; min-height: 100vh; background: var(--bg); padding: 28px 16px 50px; }
.mobile-header { text-align: center; margin-bottom: 24px; }
.mobile-title { font-size: 20px; font-weight: 700; color: var(--kraft-light); letter-spacing: 0.1em; text-transform: uppercase; }
.mobile-sub { font-size: 10px; font-weight: 500; color: #4a3a28; letter-spacing: 0.2em; text-transform: uppercase; margin-top: 4px; }

.cat-select-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.cat-btn {
  background: var(--paper); border: none; border-radius: 2px;
  padding: 18px 12px; cursor: pointer; text-align: center;
  box-shadow: 2px 3px 10px rgba(0,0,0,0.5); position: relative; overflow: hidden;
}
.cat-btn::before {
  content: ''; position: absolute; inset: 0;
  background-image: repeating-linear-gradient(transparent, transparent 20px, rgba(160,120,60,0.2) 20px, rgba(160,120,60,0.2) 21px);
  pointer-events: none;
}
.cat-btn:active { opacity: 0.8; }
.cat-btn-title { font-size: 14px; font-weight: 700; color: var(--ink); letter-spacing: 0.06em; text-transform: uppercase; position: relative; }
.cat-btn-sub { font-size: 10px; font-weight: 500; color: var(--ink-faded); margin-top: 3px; position: relative; }

#cat-sheet { display: none; }
.back-btn {
  background: none; border: none; font-size: 11px; font-weight: 700;
  color: #4a3a28; letter-spacing: 0.15em; text-transform: uppercase;
  cursor: pointer; margin-bottom: 14px; display: block;
}

.sheet-paper {
  background: var(--paper); border-radius: 2px;
  box-shadow: 2px 3px 14px rgba(0,0,0,0.55); overflow: hidden; position: relative;
}
.sheet-paper::before {
  content: ''; position: absolute; inset: 0;
  background-image: repeating-linear-gradient(transparent, transparent 26px, rgba(160,120,60,0.2) 26px, rgba(160,120,60,0.2) 27px);
  pointer-events: none; z-index: 0;
}

.sheet-header { padding: 14px 14px 0; position: relative; z-index: 1; }
.sheet-title { font-size: 16px; font-weight: 700; color: var(--ink); letter-spacing: 0.08em; text-transform: uppercase; }

.m-tab-row {
  display: flex; gap: 2px; padding: 8px 14px 0; overflow-x: auto;
  position: relative; z-index: 1; scrollbar-width: none;
  border-bottom: 1px solid rgba(100,70,30,0.3);
}
.m-tab-row::-webkit-scrollbar { display: none; }
.m-tab {
  font-size: 10px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase;
  color: var(--ink-faded); padding: 6px 10px;
  border-radius: 2px 2px 0 0; cursor: pointer; white-space: nowrap; flex-shrink: 0;
  border: 1px solid transparent; border-bottom: none; background: transparent;
}
.m-tab.active {
  background: var(--paper-dark); color: var(--ink);
  border-color: rgba(100,70,30,0.3); border-bottom: 1px solid var(--paper-dark); margin-bottom: -1px;
}

.m-tab-content { padding: 10px 14px 14px; position: relative; z-index: 1; }

.m-note-row {
  display: flex; align-items: flex-start; gap: 8px;
  padding: 7px 0; border-bottom: 1px solid rgba(100,70,30,0.12);
  cursor: grab;
}
.m-note-row:last-of-type { border-bottom: none; }
.m-note-row.dragging { opacity: 0.4; }
.m-note-row.drag-over { background: rgba(100,70,30,0.12); border-radius: 3px; }

.m-drag-handle { font-size: 14px; color: rgba(100,70,30,0.3); flex-shrink: 0; margin-top: 1px; cursor: grab; }

.m-note-text {
  font-size: 15px; font-weight: 500; color: var(--ink); line-height: 1.4; flex: 1;
  outline: none;
}
.m-note-text:focus { background: rgba(255,255,255,0.3); border-radius: 2px; padding: 0 2px; }

.m-del-btn { background: none; border: none; color: rgba(139,32,32,0.4); cursor: pointer; font-size: 18px; padding: 0; line-height: 1; flex-shrink: 0; }
.m-del-btn:hover { color: var(--stamp-red); }

.m-empty { font-size: 13px; color: rgba(90,69,48,0.35); font-style: italic; padding: 8px 0; }

.note-input-area { display: flex; gap: 8px; align-items: flex-end; border-top: 1px solid rgba(100,70,30,0.25); padding-top: 10px; margin-top: 8px; }
.note-textarea {
  flex: 1; background: transparent; border: none;
  border-bottom: 1px solid rgba(100,70,30,0.35);
  font-family: 'Inter', sans-serif; font-size: 15px; font-weight: 500;
  color: var(--ink); padding: 4px 0; resize: none; height: 52px; outline: none;
}
.note-textarea::placeholder { color: rgba(90,69,48,0.35); }
.add-note-btn {
  background: var(--ink); border: none; color: var(--kraft-light);
  font-family: 'Inter', sans-serif; font-size: 11px; font-weight: 700;
  letter-spacing: 0.1em; text-transform: uppercase;
  padding: 7px 12px; border-radius: 1px; cursor: pointer; flex-shrink: 0;
}
.add-note-btn:active { opacity: 0.8; }
</style>
</head>
<body>

<div id="tv-view">
  <div class="tv-header">
    <div class="tv-title">De Sekte <span>— onopgeloste mysteries —</span></div>
    <span class="clock" id="clock"></span>
  </div>
  <div class="grid" id="tv-grid"></div>
</div>

<div id="mobile-view">
  <div class="mobile-header">
    <div class="mobile-title">De Sekte</div>
    <div class="mobile-sub" id="mobile-sub">kies een categorie</div>
  </div>
  <div class="cat-select-grid" id="cat-select-grid"></div>
  <div id="cat-sheet">
    <button class="back-btn" onclick="showCatSelect()">← terug</button>
    <div class="sheet-paper">
      <div class="sheet-header"><div class="sheet-title" id="sheet-title"></div></div>
      <div class="m-tab-row" id="m-tab-row"></div>
      <div class="m-tab-content" id="m-tab-content"></div>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
import { getDatabase, ref, onValue, push, remove, set, update } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyDTDmAQ28KFkxgP5Sbyf31Et0Z3VU0Ecxk",
  authDomain: "murder-mystery-980c1.firebaseapp.com",
  databaseURL: "https://murder-mystery-980c1-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "murder-mystery-980c1",
  storageBucket: "murder-mystery-980c1.firebasestorage.app",
  messagingSenderId: "1000610087640",
  appId: "1:1000610087640:web:8264d2ca52c5571b1b4dad"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const CATEGORIES = [
  { id: 'mensen',     label: 'Mensen',     stamp: 'M', tabs: ['Verdachten','Getuigen','Slachtoffers'] },
  { id: 'feiten',    label: 'Feiten',     stamp: 'F', tabs: ['Tijdlijn','Alibi\'s','Locaties'] },
  { id: 'materiaal', label: 'Materiaal',  stamp: 'X', tabs: ['Bewijzen','Documenten','Foto\'s','Autopsie'] },
  { id: 'conclusies',label: 'Conclusies', stamp: 'C', tabs: ['Motieven','Theorieën','Leugens','Vragen'] },
];

let data = {};
let activeCat = null;
let activeTab = {};
CATEGORIES.forEach(c => { activeTab[c.id] = c.tabs[0]; });

const isMobile = window.innerWidth < 700;
if (isMobile) {
  document.getElementById('tv-view').style.display = 'none';
  document.getElementById('mobile-view').style.display = 'block';
}

onValue(ref(db, 'v2'), snap => {
  data = snap.val() || {};
  if (!isMobile) renderTV();
  if (isMobile && activeCat) { renderMTabs(); renderMContent(); }
});

function updateClock() {
  const el = document.getElementById('clock');
  if (el) el.textContent = new Date().toLocaleTimeString('nl-NL', { hour:'2-digit', minute:'2-digit' });
}
updateClock(); setInterval(updateClock, 15000);

function getNotes(catId, tab) {
  return data[catId] && data[catId][tab]
    ? Object.entries(data[catId][tab]).sort((a,b) => (a[1].order||0)-(b[1].order||0))
    : [];
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

async function swapNotes(catId, tab, keyA, keyB, orderA, orderB) {
  await update(ref(db, `v2/${catId}/${tab}`), {
    [`${keyA}/order`]: orderB,
    [`${keyB}/order`]: orderA
  });
}

async function updateNoteText(catId, tab, key, newText) {
  if (!newText.trim()) return;
  await set(ref(db, `v2/${catId}/${tab}/${key}/text`), newText.trim());
}

// ══ TV ══
function renderTV() {
  const grid = document.getElementById('tv-grid');
  grid.innerHTML = '';
  CATEGORIES.forEach(cat => {
    const curTab = activeTab[cat.id];
    const notes = getNotes(cat.id, curTab);
    const card = document.createElement('div');
    card.className = 'card';

    const tabsHtml = cat.tabs.map(t =>
      `<div class="tv-tab${t===curTab?' active':''}" data-cat="${cat.id}" data-tab="${t}">${esc(t)}</div>`
    ).join('');

    let bodyHtml = '';
    if (notes.length) {
      notes.forEach(([key, n]) => {
        bodyHtml += `<div class="note-row" draggable="true" data-key="${key}" data-cat="${cat.id}" data-tab="${curTab}" data-order="${n.order??0}">
          <span class="drag-handle" aria-hidden="true">⠿</span>
          <div class="note-text-tv" contenteditable="true" spellcheck="false" data-key="${key}" data-cat="${cat.id}" data-tab="${curTab}">${esc(n.text)}</div>
          <button class="note-del" data-key="${key}" data-cat="${cat.id}" data-tab="${curTab}" title="verwijderen">×</button>
        </div>`;
      });
    } else {
      bodyHtml = `<div class="tv-empty">nog niets genoteerd...</div>`;
    }

    bodyHtml += `<div class="tv-add-row">
      <input class="tv-add-input" data-cat="${cat.id}" data-tab="${curTab}" placeholder="notitie toevoegen..." />
      <button class="tv-add-btn" data-cat="${cat.id}" data-tab="${curTab}">+</button>
    </div>`;

    card.innerHTML = `
      <div class="card-header">
        <div class="card-title">${esc(cat.label)}</div>
        <div class="card-stamp">${cat.stamp}</div>
      </div>
      <div class="tab-row">${tabsHtml}</div>
      <div class="card-body">${bodyHtml}</div>
    `;

    // tab switching
    card.querySelectorAll('.tv-tab').forEach(btn => {
      btn.onclick = () => { activeTab[btn.dataset.cat] = btn.dataset.tab; renderTV(); };
    });

    // delete
    card.querySelectorAll('.note-del').forEach(btn => {
      btn.onclick = (e) => {
        e.stopPropagation();
        remove(ref(db, `v2/${btn.dataset.cat}/${btn.dataset.tab}/${btn.dataset.key}`));
      };
    });

    // inline edit - save on blur
    card.querySelectorAll('.note-text-tv').forEach(el => {
      el.addEventListener('blur', () => {
        updateNoteText(el.dataset.cat, el.dataset.tab, el.dataset.key, el.innerText);
      });
      el.addEventListener('keydown', e => {
        if (e.key === 'Enter') { e.preventDefault(); el.blur(); }
      });
    });

    // add note
    card.querySelectorAll('.tv-add-btn').forEach(btn => {
      btn.onclick = () => {
        const input = card.querySelector(`.tv-add-input[data-cat="${btn.dataset.cat}"][data-tab="${btn.dataset.tab}"]`);
        const text = input.value.trim();
        if (!text) return;
        const n = getNotes(btn.dataset.cat, btn.dataset.tab);
        push(ref(db, `v2/${btn.dataset.cat}/${btn.dataset.tab}`), { text, order: n.length });
        input.value = '';
      };
    });
    card.querySelectorAll('.tv-add-input').forEach(input => {
      input.addEventListener('keydown', e => {
        if (e.key === 'Enter') {
          const btn = card.querySelector(`.tv-add-btn[data-cat="${input.dataset.cat}"][data-tab="${input.dataset.tab}"]`);
          if (btn) btn.click();
        }
      });
    });

    // drag-and-drop
    setupDrag(card, cat.id, curTab);

    grid.appendChild(card);
  });
}

function setupDrag(container, catId, tab) {
  let dragKey = null;
  let dragOrder = null;

  container.querySelectorAll('.note-row').forEach(row => {
    row.addEventListener('dragstart', e => {
      dragKey = row.dataset.key;
      dragOrder = parseFloat(row.dataset.order);
      row.classList.add('dragging');
      e.dataTransfer.effectAllowed = 'move';
    });
    row.addEventListener('dragend', () => {
      row.classList.remove('dragging');
      container.querySelectorAll('.note-row').forEach(r => r.classList.remove('drag-over'));
    });
    row.addEventListener('dragover', e => {
      e.preventDefault();
      container.querySelectorAll('.note-row').forEach(r => r.classList.remove('drag-over'));
      if (row.dataset.key !== dragKey) row.classList.add('drag-over');
    });
    row.addEventListener('drop', e => {
      e.preventDefault();
      const targetKey = row.dataset.key;
      const targetOrder = parseFloat(row.dataset.order);
      if (targetKey !== dragKey) {
        swapNotes(catId, tab, dragKey, targetKey, dragOrder, targetOrder);
      }
      row.classList.remove('drag-over');
    });
  });
}

// ══ MOBILE ══
function renderCatSelect() {
  const grid = document.getElementById('cat-select-grid');
  grid.innerHTML = '';
  CATEGORIES.forEach(cat => {
    const btn = document.createElement('div');
    btn.className = 'cat-btn';
    btn.innerHTML = `<div class="cat-btn-title">${esc(cat.label)}</div><div class="cat-btn-sub">${cat.tabs.join(' · ')}</div>`;
    btn.onclick = () => openCat(cat.id);
    grid.appendChild(btn);
  });
}

function openCat(id) {
  activeCat = id;
  const cat = CATEGORIES.find(c => c.id === id);
  document.getElementById('cat-select-grid').style.display = 'none';
  document.getElementById('mobile-sub').textContent = '';
  document.getElementById('cat-sheet').style.display = 'block';
  document.getElementById('sheet-title').textContent = cat.label;
  renderMTabs(); renderMContent();
}

function renderMTabs() {
  const cat = CATEGORIES.find(c => c.id === activeCat);
  const row = document.getElementById('m-tab-row');
  row.innerHTML = cat.tabs.map(t =>
    `<div class="m-tab${t===activeTab[activeCat]?' active':''}" data-tab="${t}">${esc(t)}</div>`
  ).join('');
  row.querySelectorAll('.m-tab').forEach(btn => {
    btn.onclick = () => { activeTab[activeCat] = btn.dataset.tab; renderMTabs(); renderMContent(); };
  });
}

function renderMContent() {
  const tab = activeTab[activeCat];
  const notes = getNotes(activeCat, tab);
  const content = document.getElementById('m-tab-content');

  let noteListHtml = '';
  if (notes.length) {
    notes.forEach(([key, n]) => {
      noteListHtml += `<div class="m-note-row" draggable="true" data-key="${key}" data-order="${n.order??0}">
        <span class="m-drag-handle" aria-hidden="true">⠿</span>
        <div class="m-note-text" contenteditable="true" spellcheck="false" data-key="${key}">${esc(n.text)}</div>
        <button class="m-del-btn" data-key="${key}">×</button>
      </div>`;
    });
  } else {
    noteListHtml = `<div class="m-empty">nog niets genoteerd...</div>`;
  }

  content.innerHTML = `
    <div id="note-list">${noteListHtml}</div>
    <div class="note-input-area">
      <textarea class="note-textarea" id="note-input" placeholder="schrijf hier..."></textarea>
      <button class="add-note-btn" id="add-btn">toevoegen</button>
    </div>
  `;

  // delete
  content.querySelectorAll('.m-del-btn').forEach(btn => {
    btn.onclick = () => remove(ref(db, `v2/${activeCat}/${tab}/${btn.dataset.key}`));
  });

  // inline edit
  content.querySelectorAll('.m-note-text').forEach(el => {
    el.addEventListener('blur', () => updateNoteText(activeCat, tab, el.dataset.key, el.innerText));
    el.addEventListener('keydown', e => { if (e.key==='Enter') { e.preventDefault(); el.blur(); } });
  });

  // add
  document.getElementById('add-btn').onclick = submitNote;
  const ta = document.getElementById('note-input');
  if (ta) {
    ta.focus();
    ta.onkeydown = e => { if (e.key==='Enter' && !e.shiftKey) { e.preventDefault(); submitNote(); } };
  }

  // drag mobile
  setupMobileDrag(content, activeCat, tab);
}

function setupMobileDrag(container, catId, tab) {
  let dragKey = null, dragOrder = null;
  container.querySelectorAll('.m-note-row').forEach(row => {
    row.addEventListener('dragstart', e => {
      dragKey = row.dataset.key; dragOrder = parseFloat(row.dataset.order);
      row.classList.add('dragging'); e.dataTransfer.effectAllowed = 'move';
    });
    row.addEventListener('dragend', () => {
      row.classList.remove('dragging');
      container.querySelectorAll('.m-note-row').forEach(r => r.classList.remove('drag-over'));
    });
    row.addEventListener('dragover', e => {
      e.preventDefault();
      container.querySelectorAll('.m-note-row').forEach(r => r.classList.remove('drag-over'));
      if (row.dataset.key !== dragKey) row.classList.add('drag-over');
    });
    row.addEventListener('drop', e => {
      e.preventDefault();
      if (row.dataset.key !== dragKey) swapNotes(catId, tab, dragKey, row.dataset.key, dragOrder, parseFloat(row.dataset.order));
      row.classList.remove('drag-over');
    });
  });
}

function submitNote() {
  const input = document.getElementById('note-input');
  if (!input) return;
  const text = input.value.trim();
  if (!text || !activeCat) return;
  const tab = activeTab[activeCat];
  const notes = getNotes(activeCat, tab);
  push(ref(db, `v2/${activeCat}/${tab}`), { text, order: notes.length });
  input.value = ''; input.focus();
}

window.showCatSelect = function() {
  activeCat = null;
  document.getElementById('cat-sheet').style.display = 'none';
  document.getElementById('cat-select-grid').style.display = 'grid';
  document.getElementById('mobile-sub').textContent = 'kies een categorie';
};

if (isMobile) renderCatSelect();
</script>
</body>
</html>
